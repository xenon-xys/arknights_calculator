<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="明日方舟抽数计算器 - 计算合成玉、源石、寻访凭证获取数量及抽数预期">
    <meta name="keywords" content="明日方舟,合成玉,源石,寻访凭证,抽数计算器">
    <meta name="author" content="Arknights Calculator">
    <title>明日方舟抽数计算器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>" />
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent-red: #e94560;
            --accent-blue: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333355;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --card-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.08);
            --calendar-icon-filter: invert(1);
        }

        body.light-mode {
            --primary-bg: #f8f9fa;
            --secondary-bg: #ffffff;
            --accent-red: #e94560;
            --accent-blue: #0f3460;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --success: #16a34a;
            --warning: #ca8a04;
            --danger: #dc2626;
            --card-bg: rgba(0, 0, 0, 0.03);
            --input-bg: rgba(0, 0, 0, 0.05);
            --calendar-icon-filter: invert(0);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 2rem;
            color: var(--accent-red);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-red);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header h2 {
            font-size: 1.25rem;
            color: var(--accent-red);
        }

        .card-header svg {
            width: 24px;
            height: 24px;
            color: var(--accent-red);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .form-row .form-group {
            flex: 1;
        }

        input[type="date"],
        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="date"]:focus,
        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent-red);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: var(--calendar-icon-filter);
            cursor: pointer;
        }

        select option {
            background: var(--secondary-bg);
            color: var(--text-primary);
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent-red);
            cursor: pointer;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-red), #c73e54);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-red);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.2);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.3);
        }

        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .resource-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .resource-item.disabled {
            opacity: 0.5;
        }

        .resource-item input[type="checkbox"] {
            flex-shrink: 0;
        }

        .resource-info {
            flex: 1;
        }

        .resource-info h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .resource-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .resource-amount {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-red);
        }

        .claimed-input {
            width: 60px !important;
            text-align: center;
        }

        .claimed-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .event-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .event-item.stable {
            border-left: 3px solid var(--success);
        }

        .event-item.uncertain {
            border-left: 3px solid var(--warning);
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .event-header h4 {
            font-size: 0.95rem;
        }

        .event-type {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .event-type.stable {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }

        .event-type.uncertain {
            background: rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }

        .event-resources {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .event-resource {
            font-size: 0.85rem;
        }

        .event-resource label {
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .event-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .result-section {
            grid-column: span 2;
        }

        @media (max-width: 900px) {
            .result-section {
                grid-column: span 1;
            }
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.1), rgba(15, 52, 96, 0.1));
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .result-card.min {
            border-color: var(--danger);
        }

        .result-card.avg {
            border-color: var(--warning);
        }

        .result-card.max {
            border-color: var(--success);
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .result-card.min .result-value {
            color: var(--danger);
        }

        .result-card.avg .result-value {
            color: var(--warning);
        }

        .result-card.max .result-value {
            color: var(--success);
        }

        .result-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .resource-breakdown {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .resource-breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
        }

        .resource-breakdown-item span:first-child {
            color: var(--text-secondary);
        }

        .resource-breakdown-item span:last-child {
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--secondary-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            color: var(--accent-red);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 8px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--accent-red);
            border-bottom-color: var(--accent-red);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .sync-status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .sync-status.success {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }

        .sync-status.error {
            background: rgba(248, 113, 113, 0.2);
            color: var(--danger);
        }

        .sync-status.loading {
            background: rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }

        .tooltip {
            position: relative;
            cursor: help;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
        }

        .date-diff {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .date-diff span {
            display: inline-block;
            margin: 0 12px;
        }

        .date-diff strong {
            color: var(--accent-red);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(180deg);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            color: var(--text-primary);
        }

        .game-date-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            border-left: 3px solid var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </div>
    <div class="container">
        <header>
            <h1>明日方舟抽数计算器</h1>
            <p>计算从指定日期到截止日期可获得的合成玉、源石、寻访凭证及对应抽数</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <h2>日期设置</h2>
                </div>
                <div class="form-group">
                    <label>开始时间方式</label>
                    <div style="display: flex; gap: 12px;">
                        <label style="display: flex; align-items: center; gap: 6px;">
                            <input type="radio" name="startMode" value="current" checked onchange="toggleStartMode()">
                            <span>当前时间</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px;">
                            <input type="radio" name="startMode" value="custom" onchange="toggleStartMode()">
                            <span>指定日期</span>
                        </label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label id="startDateLabel">开始日期</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>
                <div class="date-diff">
                    <span>间隔：<strong id="daysDiff">0</strong> 天</span>
                    <span>约 <strong id="weeksDiff">0</strong> 周</span>
                    <span>约 <strong id="monthsDiff">0</strong> 月</span>
                </div>
                <div id="gameDateInfo" class="game-date-info"></div>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
                    <input type="checkbox" id="excludeOriginite" style="width: 18px; height: 18px;">
                    <label for="excludeOriginite" style="color: var(--text-secondary); font-size: 0.875rem;">源石不用于抽卡</label>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="calculate()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                    开始计算
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <h2>日常资源</h2>
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('jade')">合成玉</button>
                    <button class="tab" onclick="switchTab('originite')">至纯源石</button>
                    <button class="tab" onclick="switchTab('voucher')">寻访凭证</button>
                </div>
                <div class="tab-content active" id="jade-tab">
                    <div class="resource-list" id="jadeResources"></div>
                </div>
                <div class="tab-content" id="originite-tab">
                    <div class="resource-list" id="originiteResources"></div>
                </div>
                <div class="tab-content" id="voucher-tab">
                    <div class="resource-list" id="voucherResources"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <h2>限时活动</h2>
                </div>
                <div class="event-list" id="eventList">
                    <p style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无活动，点击下方按钮添加</p>
                </div>
                <button class="btn btn-secondary" style="width: 100%; margin-top: 16px;" onclick="openAddEventModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加活动
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20V10"></path>
                        <path d="M18 20V4"></path>
                        <path d="M6 20v-6"></path>
                    </svg>
                    <h2>数据同步</h2>
                </div>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" onclick="syncFromPRTS()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M21 12a9 9 0 00-9-9 9.75 9.75 0 00-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 009 9 9.75 9.75 0 006.74-2.74L21 16"></path>
                        <path d="M16 21h5v-5"></path>
                    </svg>
                    从 PRTS Wiki 同步
                </button>
                <button class="btn btn-secondary" style="width: 100%; margin-bottom: 12px;" onclick="syncFromOfficial()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M21 12a9 9 0 00-9-9 9.75 9.75 0 00-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 009 9 9.75 9.75 0 006.74-2.74L21 16"></path>
                        <path d="M16 21h5v-5"></path>
                    </svg>
                    从官网同步
                </button>
                <div id="syncStatus"></div>
            </div>

            <div class="card result-section">
                <div class="card-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    </div>
                    <div class="result-card max">
                        <div class="result-label">最高预期</div>

                        <div class="resource-breakdown" id="maxBreakdown"></div>

                <div style="margin-top: 20px; padding: 16px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;">
                    <h3 style="font-size: 1rem; margin-bottom: 12px; color: var(--text-secondary);">转换规则</h3>
                    <div style="display: flex; gap: 24px; flex-wrap: wrap; font-size: 0.85rem;">
                        <span><strong>合成玉：</strong>600 = 1抽</span>
                        <span><strong>至纯源石：</strong>3.33 = 1抽（1源石=180合成玉）</span>
                        <span><strong>寻访凭证：</strong>1 = 1抽</span>
                    </div>
                </div>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 2px solid var(--accent-red);">
                    <div class="card-header" style="margin-bottom: 16px; padding-bottom: 12px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <h2>当前库存</h2>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>合成玉</label>
                            <input type="number" id="currentJade" value="0" min="0" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>至纯源石</label>
                            <input type="number" id="currentOriginite" value="0" min="0" step="0.1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>寻访凭证</label>
                            <input type="number" id="currentVoucher" value="0" min="0" placeholder="0">
                        </div>
                    </div>
                </div>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 2px solid var(--accent-blue);">
                    <div class="card-header" style="margin-bottom: 16px; padding-bottom: 12px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                        </svg>
                        <h2>总计汇总（库存+预期）</h2>
                    </div>
                    <div class="result-grid">
                        <div class="result-card min">
                            <div class="result-label">最低总计</div>
                            <div class="result-value" id="totalMinPulls">0</div>
                            <div class="result-subtitle">抽</div>
                            <div class="resource-breakdown" id="totalMinBreakdown"></div>
                        </div>
                        <div class="result-card avg">
                            <div class="result-label">平均总计</div>
                            <div class="result-value" id="totalAvgPulls">0</div>
                            <div class="result-subtitle">抽</div>
                            <div class="resource-breakdown" id="totalAvgBreakdown"></div>
                        </div>
                        <div class="result-card max">
                            <div class="result-label">最高总计</div>
                            <div class="result-value" id="totalMaxPulls">0</div>
                            <div class="result-subtitle">抽</div>
                            <div class="resource-breakdown" id="totalMaxBreakdown"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addEventModal">
        <div class="modal">
            <div class="modal-header">
                <h2>添加限时活动</h2>
                <button class="modal-close" onclick="closeAddEventModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>活动名称</label>
                <input type="text" id="eventName" placeholder="如：SideStory活动">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="eventStartDate">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="eventEndDate">
                </div>
            </div>
            <div class="form-group">
                <label>活动类型</label>
                <select id="eventType">
                    <option value="stable">稳定活动（确定能获得）</option>
                    <option value="uncertain">不确定活动（邮件补偿等）</option>
                </select>
            </div>
            <h3 style="font-size: 1rem; margin: 20px 0 12px; color: var(--text-secondary);">合成玉</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>最低值</label>
                    <input type="number" id="jadeMin" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>平均值</label>
                    <input type="number" id="jadeAvg" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>最高值</label>
                    <input type="number" id="jadeMax" value="0" min="0">
                </div>
            </div>
            <h3 style="font-size: 1rem; margin: 20px 0 12px; color: var(--text-secondary);">至纯源石</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>最低值</label>
                    <input type="number" id="originiteMin" value="0" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>平均值</label>
                    <input type="number" id="originiteAvg" value="0" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label>最高值</label>
                    <input type="number" id="originiteMax" value="0" min="0" step="0.1">
                </div>
            </div>
            <h3 style="font-size: 1rem; margin: 20px 0 12px; color: var(--text-secondary);">寻访凭证</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>最低值</label>
                    <input type="number" id="voucherMin" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>平均值</label>
                    <input type="number" id="voucherAvg" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>最高值</label>
                    <input type="number" id="voucherMax" value="0" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddEventModal()">取消</button>
                <button class="btn btn-primary" onclick="addEvent()">添加</button>
            </div>
        </div>
    </div>

    <script>
        const CONVERSION_RATES = {
            syntheticJade: 600,
            pureOriginite: 3.33,
            recruitmentVoucher: 1
        };

        let dailyResources = [
            { id: 'daily-jade-1', name: '每日任务', resourceType: 'syntheticJade', frequency: 'daily', amount: 100, enabled: true, claimedPeriods: 0, note: '' },
            { id: 'daily-jade-2', name: '月卡', resourceType: 'syntheticJade', frequency: 'daily', amount: 200, enabled: false, claimedPeriods: 0, note: '每日领取' },
            { id: 'weekly-jade-1', name: '每周任务', resourceType: 'syntheticJade', frequency: 'weekly', amount: 500, enabled: true, claimedPeriods: 0, note: '' },
            { id: 'weekly-jade-2', name: '剿灭作战', resourceType: 'syntheticJade', frequency: 'weekly', amount: 1800, enabled: true, claimedPeriods: 0, note: '' },
            { id: 'monthly-jade-1', name: '绿票商店', resourceType: 'syntheticJade', frequency: 'monthly', amount: 600, enabled: true, claimedPeriods: 0, note: '需要240资质凭证' },
            { id: 'monthly-voucher-1', name: '每月签到', resourceType: 'recruitmentVoucher', frequency: 'monthlyFixedDate', amount: 1, enabled: true, fixedDate: 17, note: '' },
            { id: 'monthly-voucher-2', name: '绿票商店', resourceType: 'recruitmentVoucher', frequency: 'monthly', amount: 4, enabled: true, claimedPeriods: 0, note: '需要480+900资质凭证' },
            { id: 'subscription-originite-1', name: '月卡', resourceType: 'pureOriginite', frequency: 'subscription', amount: 6, enabled: false, claimedPeriods: 0, note: '购买即送' }
        ];

        let events = [];

        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const startDateLabel = document.getElementById('startDateLabel');
        
        const currentTime = new Date();
        const gameDate = convertToGameDate(currentTime);
        const today = gameDate.toISOString().split('T')[0];
        startDateInput.value = today;
        
        const nextMonth = new Date(gameDate);
        nextMonth.setMonth(nextMonth.getMonth() + 1);
        endDateInput.value = nextMonth.toISOString().split('T')[0];

        function getStartDate() {
            const mode = document.querySelector('input[name="startMode"]:checked').value;
            if (mode === 'current') {
                const now = new Date();
                return convertToGameDate(now);
            } else {
                return new Date(startDateInput.value);
            }
        }

        function toggleStartMode() {
            const mode = document.querySelector('input[name="startMode"]:checked').value;
            if (mode === 'current') {
                startDateInput.disabled = true;
                startDateInput.style.opacity = '0.5';
                startDateLabel.textContent = '开始日期（当前时间）';
                updateDateDiff();
            } else {
                startDateInput.disabled = false;
                startDateInput.style.opacity = '1';
                startDateLabel.textContent = '开始日期';
            }
        }

        function convertToGameDate(realDate) {
            const date = new Date(realDate);
            const hours = date.getHours();
            
            if (hours < 4) {
                date.setDate(date.getDate() - 1);
            }
            
            return date;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            
            const icon = document.querySelector('.theme-toggle svg');
            if (isLight) {
                icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
            } else {
                icon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
            }
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                const icon = document.querySelector('.theme-toggle svg');
                icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
            }
        }

        function updateGameDateInfo() {
            const now = new Date();
            const gameDate = convertToGameDate(now);
            const realHours = now.getHours();
            const realMinutes = now.getMinutes();
            
            let infoText = `当前现实时间：${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(realHours).padStart(2, '0')}:${String(realMinutes).padStart(2, '0')}`;
            
            if (realHours < 4) {
                infoText += `<br>游戏日期：${gameDate.getFullYear()}-${String(gameDate.getMonth() + 1).padStart(2, '0')}-${String(gameDate.getDate()).padStart(2, '0')}（凌晨4点前属于前一天）`;
            } else {
                infoText += `<br>游戏日期：${gameDate.getFullYear()}-${String(gameDate.getMonth() + 1).padStart(2, '0')}-${String(gameDate.getDate()).padStart(2, '0')}`;
            }
            
            infoText += `<br>游戏时间划分：凌晨4:00 至 次日凌晨3:59`;
            
            document.getElementById('gameDateInfo').innerHTML = infoText;
        }

        function updateDateDiff() {
            const start = getStartDate();
            const end = new Date(endDateInput.value);
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const diffWeeks = countCompleteWeeks(start, end);
            const diffMonths = Math.floor(diffDays / 30);
            
            document.getElementById('daysDiff').textContent = diffDays;
            document.getElementById('weeksDiff').textContent = diffWeeks;
            document.getElementById('monthsDiff').textContent = diffMonths;
            
            renderDailyResources();
            updateGameDateInfo();
        }

        startDateInput.addEventListener('change', updateDateDiff);
        endDateInput.addEventListener('change', updateDateDiff);
        
        applyTheme();
        toggleStartMode();
        updateDateDiff();

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        function countCompleteWeeks(start, end) {
            const startDate = new Date(start);
            const endDate = new Date(end);
            
            const startDay = startDate.getDay();
            const endDay = endDate.getDay();
            
            const startWeekSunday = new Date(startDate);
            startWeekSunday.setDate(startDate.getDate() - startDay);
            
            const endWeekSaturday = new Date(endDate);
            endWeekSaturday.setDate(endDate.getDate() + (6 - endDay));
            
            if (endWeekSaturday < startWeekSunday) return 0;
            
            const diffTime = endWeekSaturday - startWeekSunday;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            return Math.floor(diffDays / 7) + 1;
        }

        function getMaxPeriods(frequency) {
            const start = getStartDate();
            const end = new Date(endDateInput.value);
            
            if (end < start) return 0;
            
            const dayDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            
            switch (frequency) {
                case 'weekly':
                    return countCompleteWeeks(start, end);
                case 'monthly':
                    const monthsDiff = (end.getFullYear() - start.getFullYear()) * 12 + 
                                      (end.getMonth() - start.getMonth()) + 1;
                    return monthsDiff;
                default:
                    return 0;
            }
        }

        function renderDailyResources() {
            const jadeList = document.getElementById('jadeResources');
            const originiteList = document.getElementById('originiteResources');
            const voucherList = document.getElementById('voucherResources');

            jadeList.innerHTML = '';
            originiteList.innerHTML = '';
            voucherList.innerHTML = '';

            dailyResources.forEach(resource => {
                const item = document.createElement('div');
                item.className = `resource-item ${resource.enabled ? '' : 'disabled'}`;
                
                let frequencyText = '';
                let claimedInput = '';
                
                const maxPeriods = getMaxPeriods(resource.frequency);
                
                switch (resource.frequency) {
                    case 'daily':
                        frequencyText = '每日';
                        break;
                    case 'weekly':
                        frequencyText = '每周';
                        claimedInput = `
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="claimed-label">已获取周数:</span>
                                <input type="number" class="claimed-input" value="${resource.claimedPeriods}" min="0" max="${maxPeriods}" 
                                    onchange="updateClaimedPeriods('${resource.id}', this.value, ${maxPeriods})">
                                <span class="claimed-label" style="font-size: 0.65rem; color: var(--text-secondary);">/ ${maxPeriods}</span>
                            </div>
                        `;
                        break;
                    case 'monthly':
                        frequencyText = '每月';
                        claimedInput = `
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="claimed-label">已兑换月数:</span>
                                <input type="number" class="claimed-input" value="${resource.claimedPeriods}" min="0" max="${maxPeriods}" 
                                    onchange="updateClaimedPeriods('${resource.id}', this.value, ${maxPeriods})">
                                <span class="claimed-label" style="font-size: 0.65rem; color: var(--text-secondary);">/ ${maxPeriods}</span>
                            </div>
                        `;
                        break;
                    case 'monthlyFixedDate':
                        frequencyText = `每月${resource.fixedDate}号`;
                        break;
                    case 'subscription':
                        frequencyText = '一次性';
                        claimedInput = `
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="claimed-label">购买月数:</span>
                                <input type="number" class="claimed-input" value="${resource.claimedPeriods}" min="0" 
                                    onchange="updateClaimedPeriods('${resource.id}', this.value, 999)">
                            </div>
                        `;
                        break;
                }

                const checkbox = resource.frequency === 'monthlyFixedDate' ? '' : 
                    `<input type="checkbox" ${resource.enabled ? 'checked' : ''} onchange="toggleResource('${resource.id}')">`;

                const noteHtml = resource.note ? `<p style="font-size: 0.7rem; color: var(--warning); margin-top: 4px;">${resource.note}</p>` : '';
                
                item.innerHTML = `
                    ${checkbox}
                    <div class="resource-info">
                        <h4>${resource.name}</h4>
                        <p>${frequencyText} · ${resource.amount}${getResourceUnit(resource.resourceType)}</p>
                        ${noteHtml}
                    </div>
                    <div class="resource-amount">${resource.amount}</div>
                    ${claimedInput}
                `;

                if (resource.resourceType === 'syntheticJade') {
                    jadeList.appendChild(item);
                } else if (resource.resourceType === 'pureOriginite') {
                    originiteList.appendChild(item);
                } else if (resource.resourceType === 'recruitmentVoucher') {
                    voucherList.appendChild(item);
                }
            });
        }

        function getResourceUnit(type) {
            switch (type) {
                case 'syntheticJade': return '合成玉';
                case 'pureOriginite': return '源石';
                case 'recruitmentVoucher': return '凭证';
                default: return '';
            }
        }

        function toggleResource(id) {
            const resource = dailyResources.find(r => r.id === id);
            if (resource) {
                resource.enabled = !resource.enabled;
                renderDailyResources();
            }
        }

        function updateClaimedPeriods(id, value, maxPeriods) {
            const resource = dailyResources.find(r => r.id === id);
            if (resource) {
                let numValue = parseInt(value) || 0;
                numValue = Math.max(0, numValue);
                if (maxPeriods !== 999) {
                    numValue = Math.min(numValue, maxPeriods);
                }
                resource.claimedPeriods = numValue;
            }
        }

        function openAddEventModal() {
            document.getElementById('addEventModal').classList.add('active');
        }

        function closeAddEventModal() {
            document.getElementById('addEventModal').classList.remove('active');
        }

        function addEvent() {
            const name = document.getElementById('eventName').value;
            const startDate = document.getElementById('eventStartDate').value;
            const endDate = document.getElementById('eventEndDate').value;
            const type = document.getElementById('eventType').value;
            
            const jadeMin = parseFloat(document.getElementById('jadeMin').value) || 0;
            const jadeAvg = parseFloat(document.getElementById('jadeAvg').value) || 0;
            const jadeMax = parseFloat(document.getElementById('jadeMax').value) || 0;
            
            const originiteMin = parseFloat(document.getElementById('originiteMin').value) || 0;
            const originiteAvg = parseFloat(document.getElementById('originiteAvg').value) || 0;
            const originiteMax = parseFloat(document.getElementById('originiteMax').value) || 0;
            
            const voucherMin = parseFloat(document.getElementById('voucherMin').value) || 0;
            const voucherAvg = parseFloat(document.getElementById('voucherAvg').value) || 0;
            const voucherMax = parseFloat(document.getElementById('voucherMax').value) || 0;

            if (!name || !startDate || !endDate) {
                alert('请填写活动名称和日期');
                return;
            }

            const newEvent = {
                id: Date.now().toString(),
                name,
                startDate,
                endDate,
                type,
                resources: [
                    { resourceType: 'syntheticJade', minAmount: jadeMin, avgAmount: jadeAvg, maxAmount: jadeMax },
                    { resourceType: 'pureOriginite', minAmount: originiteMin, avgAmount: originiteAvg, maxAmount: originiteMax },
                    { resourceType: 'recruitmentVoucher', minAmount: voucherMin, avgAmount: voucherAvg, maxAmount: voucherMax }
                ]
            };

            events.push(newEvent);
            renderEvents();
            closeAddEventModal();
            
            document.getElementById('eventName').value = '';
            document.getElementById('eventStartDate').value = '';
            document.getElementById('eventEndDate').value = '';
            document.getElementById('jadeMin').value = '0';
            document.getElementById('jadeAvg').value = '0';
            document.getElementById('jadeMax').value = '0';
            document.getElementById('originiteMin').value = '0';
            document.getElementById('originiteAvg').value = '0';
            document.getElementById('originiteMax').value = '0';
            document.getElementById('voucherMin').value = '0';
            document.getElementById('voucherAvg').value = '0';
            document.getElementById('voucherMax').value = '0';
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            renderEvents();
        }

        function renderEvents() {
            const eventList = document.getElementById('eventList');
            
            if (events.length === 0) {
                eventList.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无活动，点击下方按钮添加</p>';
                return;
            }

            eventList.innerHTML = '';

            events.forEach(event => {
                const item = document.createElement('div');
                item.className = `event-item ${event.type}`;
                
                const jadeResource = event.resources.find(r => r.resourceType === 'syntheticJade');
                const originiteResource = event.resources.find(r => r.resourceType === 'pureOriginite');
                const voucherResource = event.resources.find(r => r.resourceType === 'recruitmentVoucher');

                item.innerHTML = `
                    <div class="event-header">
                        <h4>${event.name}</h4>
                        <div>
                            <span class="event-type ${event.type}">${event.type === 'stable' ? '稳定' : '不确定'}</span>
                            <button class="btn btn-danger" style="margin-left: 8px; padding: 2px 8px; font-size: 0.75rem;" onclick="deleteEvent('${event.id}')">删除</button>
                        </div>
                    </div>
                    <div class="event-resources">
                        ${jadeResource && (jadeResource.minAmount > 0 || jadeResource.avgAmount > 0 || jadeResource.maxAmount > 0) ?
                            `<div class="event-resource"><label>合成玉:</label> ${jadeResource.minAmount}-${jadeResource.maxAmount} (${jadeResource.avgAmount})</div>` : ''}
                        ${originiteResource && (originiteResource.minAmount > 0 || originiteResource.avgAmount > 0 || originiteResource.maxAmount > 0) ?
                            `<div class="event-resource"><label>源石:</label> ${originiteResource.minAmount}-${originiteResource.maxAmount} (${originiteResource.avgAmount})</div>` : ''}
                        ${voucherResource && (voucherResource.minAmount > 0 || voucherResource.avgAmount > 0 || voucherResource.maxAmount > 0) ?
                            `<div class="event-resource"><label>凭证:</label> ${voucherResource.minAmount}-${voucherResource.maxAmount} (${voucherResource.avgAmount})</div>` : ''}
                    </div>
                    <div class="event-date">${event.startDate} ~ ${event.endDate}</div>
                `;

                eventList.appendChild(item);
            });
        }

        function calculate() {
            const start = getStartDate();
            const end = new Date(endDateInput.value);
            
            if (end < start) {
                alert('结束日期不能早于开始日期');
                return;
            }

            const dayDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            const weekDiff = countCompleteWeeks(start, end);
            
            const monthDiff = (end.getFullYear() - start.getFullYear()) * 12 + 
                             (end.getMonth() - start.getMonth()) + 1;

            const dailyTotals = {
                syntheticJade: 0,
                pureOriginite: 0,
                recruitmentVoucher: 0
            };

            dailyResources.forEach(resource => {
                if (!resource.enabled) return;

                let amount = 0;

                switch (resource.frequency) {
                    case 'daily':
                        amount = resource.amount * dayDiff;
                        break;
                    case 'weekly':
                        const effectiveWeeks = Math.max(0, weekDiff - resource.claimedPeriods);
                        amount = resource.amount * effectiveWeeks;
                        break;
                    case 'monthly':
                        const effectiveMonths = Math.max(0, monthDiff - resource.claimedPeriods);
                        amount = resource.amount * effectiveMonths;
                        break;
                    case 'monthlyFixedDate':
                        amount = countFixedDateOccurrences(start, end, resource.fixedDate) * resource.amount;
                        break;
                    case 'subscription':
                        amount = resource.amount * resource.claimedPeriods;
                        break;
                }

                dailyTotals[resource.resourceType] += amount;
            });

            const eventTotals = {
                min: { syntheticJade: 0, pureOriginite: 0, recruitmentVoucher: 0 },
                avg: { syntheticJade: 0, pureOriginite: 0, recruitmentVoucher: 0 },
                max: { syntheticJade: 0, pureOriginite: 0, recruitmentVoucher: 0 }
            };

            events.forEach(event => {
                const eventStart = new Date(event.startDate);
                const eventEnd = new Date(event.endDate);

                if (eventEnd < start || eventStart > end) return;

                event.resources.forEach(resource => {
                    if (event.type === 'stable') {
                        eventTotals.min[resource.resourceType] += resource.avgAmount;
                        eventTotals.avg[resource.resourceType] += resource.avgAmount;
                        eventTotals.max[resource.resourceType] += resource.avgAmount;
                    } else {
                        eventTotals.min[resource.resourceType] += resource.minAmount;
                        eventTotals.avg[resource.resourceType] += resource.avgAmount;
                        eventTotals.max[resource.resourceType] += resource.maxAmount;
                    }
                });
            });

            const minTotals = {
                syntheticJade: Math.round(dailyTotals.syntheticJade + eventTotals.min.syntheticJade),
                pureOriginite: parseFloat((dailyTotals.pureOriginite + eventTotals.min.pureOriginite).toFixed(2)),
                recruitmentVoucher: Math.round(dailyTotals.recruitmentVoucher + eventTotals.min.recruitmentVoucher)
            };

            const avgTotals = {
                syntheticJade: Math.round(dailyTotals.syntheticJade + eventTotals.avg.syntheticJade),
                pureOriginite: parseFloat((dailyTotals.pureOriginite + eventTotals.avg.pureOriginite).toFixed(2)),
                recruitmentVoucher: Math.round(dailyTotals.recruitmentVoucher + eventTotals.avg.recruitmentVoucher)
            };

            const maxTotals = {
                syntheticJade: Math.round(dailyTotals.syntheticJade + eventTotals.max.syntheticJade),
                pureOriginite: parseFloat((dailyTotals.pureOriginite + eventTotals.max.pureOriginite).toFixed(2)),
                recruitmentVoucher: Math.round(dailyTotals.recruitmentVoucher + eventTotals.max.recruitmentVoucher)
            };

            const minPulls = calculatePulls(minTotals);
            const avgPulls = calculatePulls(avgTotals);
            const maxPulls = calculatePulls(maxTotals);

            animateValue('minPulls', 0, minPulls, 500);
            animateValue('avgPulls', 0, avgPulls, 500);
            animateValue('maxPulls', 0, maxPulls, 500);

            renderBreakdown('minBreakdown', minTotals);
            renderBreakdown('avgBreakdown', avgTotals);
            renderBreakdown('maxBreakdown', maxTotals);

            const currentJade = parseFloat(document.getElementById('currentJade').value) || 0;
            const currentOriginite = parseFloat(document.getElementById('currentOriginite').value) || 0;
            const currentVoucher = parseFloat(document.getElementById('currentVoucher').value) || 0;

            const totalMinTotals = {
                syntheticJade: minTotals.syntheticJade + currentJade,
                pureOriginite: parseFloat((minTotals.pureOriginite + currentOriginite).toFixed(2)),
                recruitmentVoucher: minTotals.recruitmentVoucher + currentVoucher
            };

            const totalAvgTotals = {
                syntheticJade: avgTotals.syntheticJade + currentJade,
                pureOriginite: parseFloat((avgTotals.pureOriginite + currentOriginite).toFixed(2)),
                recruitmentVoucher: avgTotals.recruitmentVoucher + currentVoucher
            };

            const totalMaxTotals = {
                syntheticJade: maxTotals.syntheticJade + currentJade,
                pureOriginite: parseFloat((maxTotals.pureOriginite + currentOriginite).toFixed(2)),
                recruitmentVoucher: maxTotals.recruitmentVoucher + currentVoucher
            };

            const totalMinPulls = calculatePulls(totalMinTotals);
            const totalAvgPulls = calculatePulls(totalAvgTotals);
            const totalMaxPulls = calculatePulls(totalMaxTotals);

            animateValue('totalMinPulls', 0, totalMinPulls, 500);
            animateValue('totalAvgPulls', 0, totalAvgPulls, 500);
            animateValue('totalMaxPulls', 0, totalMaxPulls, 500);

            renderBreakdown('totalMinBreakdown', totalMinTotals);
            renderBreakdown('totalAvgBreakdown', totalAvgTotals);
            renderBreakdown('totalMaxBreakdown', totalMaxTotals);
        }

        function countFixedDateOccurrences(start, end, fixedDate) {
            let count = 0;
            const current = new Date(start);
            
            while (current <= end) {
                const targetDate = new Date(current.getFullYear(), current.getMonth(), fixedDate);
                
                if (targetDate >= start && targetDate <= end) {
                    count++;
                }
                
                current.setMonth(current.getMonth() + 1);
            }
            
            return count;
        }

        function calculatePulls(totals) {
            const jadePulls = Math.floor(totals.syntheticJade / CONVERSION_RATES.syntheticJade);
            const voucherPulls = totals.recruitmentVoucher;
            
            const excludeOriginite = document.getElementById('excludeOriginite').checked;
            const originitePulls = excludeOriginite ? 0 : Math.floor(totals.pureOriginite / CONVERSION_RATES.pureOriginite);
            
            return jadePulls + originitePulls + voucherPulls;
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            const range = end - start;
            let current = start;
            const increment = end > start ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / range));
            const timer = setInterval(function() {
                current += increment;
                obj.innerHTML = current;
                if (current == end) {
                    clearInterval(timer);
                }
            }, stepTime || 10);
        }

        function renderBreakdown(id, totals) {
            const container = document.getElementById(id);
            
            const jadePulls = Math.floor(totals.syntheticJade / CONVERSION_RATES.syntheticJade);
            const voucherPulls = totals.recruitmentVoucher;
            
            const excludeOriginite = document.getElementById('excludeOriginite').checked;
            const originitePulls = excludeOriginite ? 0 : Math.floor(totals.pureOriginite / CONVERSION_RATES.pureOriginite);
            
            const originiteDisplay = excludeOriginite ? `${totals.pureOriginite}` : `${totals.pureOriginite} → ${originitePulls}抽`;

            container.innerHTML = `
                <div class="resource-breakdown-item">
                    <span>合成玉</span>
                    <span>${totals.syntheticJade} → ${jadePulls}抽</span>
                </div>
                <div class="resource-breakdown-item">
                    <span>至纯源石</span>
                    <span>${originiteDisplay}</span>
                </div>
                <div class="resource-breakdown-item">
                    <span>寻访凭证</span>
                    <span>${totals.recruitmentVoucher} → ${voucherPulls}抽</span>
                </div>
            `;
        }

        async function syncFromPRTS() {
            const status = document.getElementById('syncStatus');
            status.innerHTML = '<div class="sync-status loading">正在从PRTS Wiki同步数据...</div>';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                status.innerHTML = '<div class="sync-status success">已从PRTS Wiki同步数据（演示）</div>';
                
                setTimeout(() => {
                    status.innerHTML = '';
                }, 3000);
            } catch (error) {
                status.innerHTML = '<div class="sync-status error">同步失败，请检查网络连接</div>';
            }
        }

        async function syncFromOfficial() {
            const status = document.getElementById('syncStatus');
            status.innerHTML = '<div class="sync-status loading">正在从官网同步数据...</div>';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                status.innerHTML = '<div class="sync-status success">已从官网同步数据（演示）</div>';
                
                setTimeout(() => {
                    status.innerHTML = '';
                }, 3000);
            } catch (error) {
                status.innerHTML = '<div class="sync-status error">同步失败，请检查网络连接</div>';
            }
        }

        renderDailyResources();
        renderEvents();
    </script>
</body>
